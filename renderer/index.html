<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>SilverVPN</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar">
        <header class="brand">
          <div class="brand-mark">S</div>
          <div>
            <h1>SilverVPN</h1>
            <p id="coreState">正在读取状态</p>
          </div>
        </header>

        <section class="panel connection-panel" aria-labelledby="connectionTitle">
          <div class="panel-title-row">
            <h2 id="connectionTitle">连接</h2>
            <span id="modeBadge" class="badge">智能代理</span>
          </div>
          <div class="primary-actions">
            <button id="startCore" class="button button-primary" type="button">
              <span class="icon" aria-hidden="true">▶</span>
              启动
            </button>
            <button id="stopCore" class="button" type="button">
              <span class="icon" aria-hidden="true">■</span>
              停止
            </button>
          </div>
          <div class="segmented" role="group" aria-label="代理模式">
            <button class="mode-button" data-mode="rule" type="button">智能代理</button>
            <button class="mode-button" data-mode="global" type="button">全局代理</button>
            <button class="mode-button" data-mode="direct" type="button">直连模式</button>
          </div>
          <label class="switch-row">
            <input id="systemProxy" type="checkbox" />
            <span id="systemProxyLabel">系统与终端代理</span>
          </label>
          <div id="tunControl" class="tun-control">
            <div class="tun-control-row">
              <label class="switch-row tun-switch-row">
                <input id="tunMode" type="checkbox" />
                <span id="tunModeLabel">TUN 模式</span>
              </label>
              <span id="tunState" class="badge badge-muted">正在预检</span>
            </div>
            <p id="tunMessage" class="tun-message">TUN 默认关闭，正在等待后端预检。</p>
            <div id="tunConflicts" class="tun-conflicts" role="alert" hidden></div>
            <div class="tun-actions">
              <button id="refreshTunStatus" class="button button-small" type="button">重新检测</button>
              <button id="restoreDefaultNetwork" class="button button-small" type="button">恢复默认网络</button>
            </div>
          </div>
          <label class="field-label" for="languageSelect">Language</label>
          <select id="languageSelect">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
          </select>
          <dl class="metric-list">
            <div>
              <dt>HTTP</dt>
              <dd id="httpPort">-</dd>
            </div>
            <div>
              <dt>SOCKS</dt>
              <dd id="socksPort">-</dd>
            </div>
            <div>
              <dt>节点</dt>
              <dd id="proxyCount">0</dd>
            </div>
          </dl>
        </section>

        <section class="panel account-panel" aria-labelledby="accountTitle">
          <div class="panel-title-row">
            <h2 id="accountTitle">账号</h2>
            <span id="accountState" class="badge badge-muted">未登录</span>
          </div>
          <form id="loginForm" class="stack-form">
            <input id="apiBase" type="url" placeholder="服务端 URL" autocomplete="url" />
            <input id="username" type="email" placeholder="账号" autocomplete="username" />
            <input id="password" type="password" placeholder="密码" autocomplete="current-password" />
            <div class="button-row">
              <button class="button button-primary" type="submit">登录并更新</button>
              <button id="refreshUser" class="button" type="button">刷新</button>
            </div>
          </form>
        </section>
      </aside>

      <main class="main">
        <section class="toolbar">
          <div>
            <p class="section-kicker">当前节点</p>
            <h2 id="currentProxy">未选择</h2>
          </div>
          <div class="toolbar-actions">
            <input id="nodeSearch" type="search" placeholder="搜索节点" />
            <button id="delayAll" class="button" type="button">延迟测试</button>
            <button id="refreshDashboard" class="icon-button" title="刷新" type="button">↻</button>
          </div>
        </section>

        <section class="node-surface" aria-label="节点列表">
          <div class="node-header">
            <span>节点</span>
            <span>协议</span>
            <span>延迟</span>
            <span>操作</span>
          </div>
          <div id="nodeList" class="node-list"></div>
        </section>

        <section class="panel log-panel" aria-labelledby="logTitle">
          <div class="panel-title-row">
            <h2 id="logTitle">核心日志</h2>
            <button id="openLogs" class="button button-small" type="button">打开目录</button>
          </div>
          <pre id="coreLog" class="log-output">暂无日志</pre>
        </section>
      </main>

      <aside class="inspector">
        <section class="panel network-panel" aria-labelledby="networkTitle">
          <div class="panel-title-row">
            <div>
              <h2 id="networkTitle">网络状态</h2>
              <p id="networkCheckedAt" class="section-kicker">尚未检测</p>
            </div>
            <button id="refreshNetwork" class="icon-button" title="刷新网络状态" type="button">↻</button>
          </div>
          <div class="network-summary">
            <div class="network-state-row">
              <span>SilverVPN</span>
              <span id="silverState" class="badge badge-muted">未连接</span>
            </div>
            <dl class="detail-list compact-list">
              <div>
                <dt>直连出口</dt>
                <dd id="directEgress">-</dd>
              </div>
              <div>
                <dt>SilverVPN 出口</dt>
                <dd id="silverEgress">-</dd>
              </div>
              <div>
                <dt>系统代理</dt>
                <dd id="systemProxyActual">-</dd>
              </div>
              <div>
                <dt>默认路由</dt>
                <dd id="defaultRoute">-</dd>
              </div>
              <div>
                <dt>隧道网卡</dt>
                <dd id="tunnelInterfaces">-</dd>
              </div>
              <div>
                <dt>本地端口</dt>
                <dd id="listeningPorts">-</dd>
              </div>
            </dl>
            <div id="networkWarnings" class="network-warnings" hidden></div>
          </div>
        </section>

        <section class="panel" aria-labelledby="subscriptionTitle">
          <div class="panel-title-row">
            <h2 id="subscriptionTitle">订阅</h2>
            <button id="importFile" class="button button-small" type="button">导入文件</button>
          </div>
          <form id="importForm" class="stack-form">
            <textarea id="subscriptionSource" rows="4" placeholder="订阅 URL / sub://..."></textarea>
            <button class="button button-primary" type="submit">导入订阅</button>
          </form>
          <label class="field-label" for="profileSelect">配置方案</label>
          <select id="profileSelect">
            <option value="">当前配置</option>
          </select>
          <dl class="detail-list">
            <div>
              <dt>来源</dt>
              <dd id="profileSource">-</dd>
            </div>
            <div>
              <dt>数量</dt>
              <dd id="profileCount">-</dd>
            </div>
            <div>
              <dt>更新</dt>
              <dd id="profileUpdated">-</dd>
            </div>
          </dl>
        </section>

        <section class="panel" aria-labelledby="bypassTitle">
          <div class="panel-title-row">
            <h2 id="bypassTitle">直连/绕过地址</h2>
            <button id="saveBypass" class="button button-small" type="button">保存</button>
          </div>
          <textarea id="bypassHosts" rows="6" placeholder="每行一个域名或网段，例如：&#10;gitlab.example.org&#10;*.example.org&#10;192.168.0.0/16"></textarea>
          <dl class="detail-list compact-list">
            <div>
              <dt>默认</dt>
              <dd id="defaultBypassHosts">内网网段和 localhost</dd>
            </div>
          </dl>
        </section>

        <section class="panel" aria-labelledby="testsTitle">
          <div class="panel-title-row">
            <h2 id="testsTitle">连通性测试</h2>
            <span id="testState" class="badge badge-muted">待测试</span>
          </div>
          <div class="test-grid">
            <button class="button" data-test-url="https://www.google.com" type="button">Google</button>
            <button class="button" data-test-url="https://api.openai.com/v1/models" type="button">OpenAI</button>
            <button id="detectIp" class="button" type="button">出口 IP</button>
            <button id="testLan" class="button" type="button">192.168.9.27:22</button>
          </div>
          <form id="customTestForm" class="inline-form">
            <input id="customTestUrl" type="url" placeholder="https://example.com" />
            <button class="icon-button" title="测试" type="submit">↗</button>
          </form>
          <pre id="testOutput" class="result-output">等待测试</pre>
        </section>

        <section class="panel" aria-labelledby="pathsTitle">
          <div class="panel-title-row">
            <h2 id="pathsTitle">路径</h2>
            <button id="openConfig" class="button button-small" type="button">打开配置</button>
          </div>
          <dl class="detail-list">
            <div>
              <dt>数据目录</dt>
              <dd id="dataDir">-</dd>
            </div>
            <div>
              <dt>配置文件</dt>
              <dd id="configFile">-</dd>
            </div>
            <div>
              <dt>控制 API</dt>
              <dd id="controlApi">-</dd>
            </div>
          </dl>
        </section>
      </aside>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
