              text = path.read_text(encoding='utf-8')
              if 'SophiaVPN conflict policy' in text or 'SophiaVPN 冲突检测策略' in text:
                  continue
              if doc.endswith('.zh-CN.md') or doc == 'INSTALL_USAGE_GUIDE.md':
                  text += '''\n\n## SophiaVPN 冲突检测策略\n\nSophiaVPN 会检测其他 VPN/代理/网络接入客户端。检测到这类进程时，`sophia on` 仍可启动本地代理、终端代理和 VS Code 代理，但会跳过自动 macOS 系统代理接管，并打印具体冲突软件、类别和进程信息。\n\n该策略不针对某一个专用软件做特殊化处理。校园网、企业网或类似网络接入客户端可以作为本地代理共存场景，但 SophiaVPN 不会在检测到它们时自动覆盖系统代理。\n\n```bash\nsophia conflicts\nsophia system-proxy on --force\n```\n'''
              else:
